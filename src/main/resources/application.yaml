spring:
  application:
    name: energy-api
  cache:
    type: caffeine
    cache-names:
      - generationMix
    caffeine:
      spec: maximumSize=100,expireAfterWrite=5m

server:
  port: ${PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info

carbon-intensity:
  api:
    base-url: https://api.carbonintensity.org.uk
    timeout: 5s

app:
  cors:
    allowed-origins:
      - ${FRONTEND_ORIGIN:http://localhost:3000}